<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1b50" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Twitcher - find eBird Rarities" />
    <title>Twitcher - find eBird Rarities</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="app"></div>
    <!-- Plain (non-module) script so Vite preserves it verbatim in the build output.
         Registers the SW with updateViaCache:'none' so the browser byte-checks sw.js
         on every load, and does a one-time cache+SW wipe when CACHE_RESET_VERSION changes. -->
    <script>
      (function () {
        var CACHE_RESET_VERSION = '2026-03-06-3'
        var CACHE_RESET_KEY = 'mrm_bootstrap_cache_reset_version'
        function nukeAndReload() {
          try {
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (r) { r.unregister() })
              })
            }
            if (window.caches) {
              caches.keys().then(function (keys) {
                keys.forEach(function (k) { caches.delete(k) })
              })
            }
            localStorage.setItem(CACHE_RESET_KEY, CACHE_RESET_VERSION)
          } catch (e) {}
        }
        try {
          if (localStorage.getItem(CACHE_RESET_KEY) !== CACHE_RESET_VERSION) {
            nukeAndReload()
          }
        } catch (e) {}
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
              .catch(function () {})
          })
        }
      })()
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
