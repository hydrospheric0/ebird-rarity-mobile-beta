<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c1b50" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Twitcher - find eBird Rarities" />
    <title>Twitcher - find eBird Rarities</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  </head>
  <body>
    <div id="app"></div>
    <!-- Plain (non-module) script so Vite preserves it verbatim in the build output.
         1. Redirects to ?_v=BUILD_VER so CDN cold-miss guarantees fresh HTML on each deploy.
         2. One-time SW/cache nuke when CACHE_RESET_VERSION changes.
         3. Registers SW with updateViaCache:'none' for automatic future updates. -->
    <script>
      (function () {
        var BUILD_VER = '0.7.0-beta.20'
        var CACHE_RESET_VERSION = '2026-03-07-1'
        var CACHE_RESET_KEY = 'mrm_bootstrap_cache_reset_version'

        // Step 1: if the URL doesn't have ?_v=BUILD_VER, redirect to it.
        // This forces a cache miss at the CDN edge since the URL is new each deploy.
        var sp = new URLSearchParams(location.search)
        if (sp.get('_v') !== BUILD_VER) {
          sp.set('_v', BUILD_VER)
          location.replace(location.pathname + '?' + sp.toString() + (location.hash || ''))
          return
        }
        // Step 2: strip _v from address bar so it doesn't linger.
        history.replaceState(null, '', location.pathname + (location.hash || ''))

        // Step 3: one-time full wipe of old SWs and caches.
        function nukeAndReload() {
          try {
            if (navigator.serviceWorker) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (r) { r.unregister() })
              })
            }
            if (window.caches) {
              caches.keys().then(function (keys) {
                keys.forEach(function (k) { caches.delete(k) })
              })
            }
            localStorage.setItem(CACHE_RESET_KEY, CACHE_RESET_VERSION)
          } catch (e) {}
        }
        try {
          if (localStorage.getItem(CACHE_RESET_KEY) !== CACHE_RESET_VERSION) {
            nukeAndReload()
          }
        } catch (e) {}

        // Step 4: register SW with updateViaCache:'none'.
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
              .catch(function () {})
          })
        }
      })()
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
